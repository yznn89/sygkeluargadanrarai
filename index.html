<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yzeen Profile</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* BACKGROUND */

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:linear-gradient(-45deg,#020202,#001a1f,#000f13,#020202);
background-size:400% 400%;
animation:bgmove 15s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* STARS */

.stars{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate;
}

.star:nth-child(1){top:10%;left:20%;}
.star:nth-child(2){top:30%;left:70%;}
.star:nth-child(3){top:60%;left:40%;}
.star:nth-child(4){top:80%;left:80%;}
.star:nth-child(5){top:50%;left:10%;}
.star:nth-child(6){top:20%;left:50%;}
.star:nth-child(7){top:75%;left:30%;}
.star:nth-child(8){top:40%;left:85%;}

@keyframes twinkle{
0%{opacity:0.3}
100%{opacity:1}
}

/* SUPER SMOOTH INTRO */

.profile,
.stats,
.links,
.spotify-card,
.footer{
opacity:0;
transform:translateY(40px) scale(0.97);
filter:blur(8px);
animation:smoothReveal 1.6s cubic-bezier(.19,1,.22,1) forwards;
}

.stats{animation-delay:.3s;}
.links{animation-delay:.6s;}
.spotify-card{animation-delay:.9s;}
.footer{animation-delay:1.2s;}

@keyframes smoothReveal{
0%{
opacity:0;
transform:translateY(40px) scale(.97);
filter:blur(10px);
}

100%{
opacity:1;
transform:translateY(0) scale(1);
filter:blur(0);
}
}

/* PROFILE */

.profile{
margin-top:90px;
}

.profile img{
width:130px;
height:130px;
border-radius:50%;
border:3px solid #00eaff;
box-shadow:0 0 30px #00eaff;
animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

.name{
font-size:32px;
margin-top:10px;
font-weight:bold;
}

.verify{
color:#00aaff;
font-size:20px;
margin-left:6px;
}

/* RUNNING TEXT */

.bio{
margin-top:6px;
color:#aaa;
font-size:14px;
overflow:hidden;
white-space:nowrap;
width:240px;
margin-left:auto;
margin-right:auto;
position:relative;
}

.bio span{
position:absolute;
animation:runtext 10s linear infinite;
}

@keyframes runtext{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* STATS */

.stats{
display:flex;
justify-content:center;
gap:40px;
margin-top:22px;
}

.stat h3{
color:#00eaff;
margin:0;
}

.stat p{
margin:0;
font-size:12px;
color:#aaa;
}

/* BUTTONS */

.links{
display:grid;
grid-template-columns:repeat(2,170px);
gap:16px;
justify-content:center;
margin-top:28px;
}

.btn{
padding:13px;
border-radius:14px;
border:1px solid #222;
background:#0c0c0c;
color:white;
text-decoration:none;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
cursor:pointer;
transition:all .35s cubic-bezier(.19,1,.22,1);
}

.btn:hover{
border-color:#00eaff;
box-shadow:0 0 20px rgba(0,234,255,0.5);
transform:translateY(-4px) scale(1.03);
}

/* SPOTIFY CARD */

.spotify-card{
width:350px;
margin:42px auto;
background:#0f0f0f;
border-radius:16px;
padding:14px;
border:1px solid #1a1a1a;
box-shadow:0 0 18px rgba(0,234,255,0.2);
transition:.4s;
}

.spotify-card:hover{
transform:scale(1.02);
box-shadow:0 0 30px rgba(0,234,255,0.4);
}

.spotify-header{
display:flex;
align-items:center;
gap:8px;
margin-bottom:10px;
font-size:14px;
color:#1db954;
}

.spotify-card iframe{
border-radius:10px;
}

/* FOOTER */

.footer{
margin-top:35px;
color:#888;
font-size:13px;
}

/* PAYMENT POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:.35s;
}

.popup.show{
opacity:1;
pointer-events:auto;
}

.popup-box{
background:#0f0f0f;
width:320px;
border-radius:18px;
padding:20px;
border:1px solid #00eaff;
box-shadow:0 0 25px rgba(0,234,255,.3);
transform:scale(.9);
transition:.3s;
}

.popup.show .popup-box{
transform:scale(1);
}

.qr{
width:180px;
margin:12px auto;
display:block;
border-radius:10px;
}

.pay{
background:#111;
margin-top:10px;
padding:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.copybtn{
background:#00eaff;
border:none;
padding:4px 10px;
border-radius:6px;
cursor:pointer;
}

.close{
margin-top:15px;
padding:8px 15px;
border:none;
border-radius:8px;
background:#222;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<script>

function closePayment(){
